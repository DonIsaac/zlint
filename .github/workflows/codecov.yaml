name: Codecov
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  ZIG_VERSION: 0.16.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codecov:
    name: Collect and upload test coverage
    runs-on: "ubuntu-22.04"
    steps:
      - uses: actions/checkout@v7
      - name: Install kcov
        run: |
          sudo apt-get update
          sudo apt-get install -y kcov
      - uses: extractions/setup-just@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - run: just submodules
      - run: zig build
      - run: just coverage
      - uses: codecov/codecov-action@v7
        with:
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: ./.coverage/all/kcov-merged/cobertura.xml
          fail_ci_if_error: true

      # TEMP DEBUG: capture the real kcov output CI produces so we can see why
      # Codecov marks the report unusable. Remove once the upload is fixed.
      - name: Upload kcov report as artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kcov-merged-debug
          path: ./.coverage/all/kcov-merged/
